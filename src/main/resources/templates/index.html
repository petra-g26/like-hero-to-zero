<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
        <title>Like Hero To Zero</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
                rel="stylesheet"></head>
<body><nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="/">
                        Like Hero To Zero
                </a>
                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-center"
                     id="navbarNav">
                        <ul class="navbar-nav">
                                <li class="nav-item">
                                        <a class="nav-link active" href="/">
                                                Home
                                        </a>
                                </li>
                                <li class="nav-item">
                                        <a class="nav-link" href="/countries">
                                                Länder
                                        </a>
                                </li>
                                <li class="nav-item">
                                        <a class="nav-link" href="/scientist">
                                                Wissenschaftlerbereich
                                        </a>
                                </li>
                        </ul>
                </div>
        </div>
</nav>
<div class="container mt-5">
        <div class="text-center">
                <h1 class="display-4">
                        Willkommen bei Like Hero To Zero
                </h1>
                <p class="lead mt-4">
                        Öffentliche CO₂-Emissionsdaten verschiedener Länder.
                </p>
                <button class="btn btn-success btn-lg mt-3">
                        CO₂-Daten ansehen
                </button>
                </div>
        <div class="mt-5">
                <h3>Verfügbare Länder</h3>
                <ul class="list-group mt-3">
                        <li class="list-group-item"
                            th:each="country : ${countries}">
                                <span th:text="${country.name}"></span>
                        </li>
                </ul>
        </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
