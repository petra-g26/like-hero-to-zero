<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wissenschaftlerbereich</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body style="background-color: #f4f7f6">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            Like Hero To Zero
        </a>
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center"
             id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/countries">
                        Länder
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/scientist">
                        Wissenschaftlerbereich
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5 mb-5">
    <h1 class="mb-4">
        Wissenschaftlerbereich
    </h1>
    <p>
        Hier können zukünftig neue CO₂-Daten
        hinzugefügt oder bearbeitet werden.
    </p>
    <div th:if="${successMessage}"
         class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>
    <div class="card shadow p-4">
    <form class="mt-5"
    method="post"
    action="/scientist">
        <div class="mb-3">
            <label class="form-label">
                Land
            </label>
            <input type="text"
                   name="country"
                   class="form-control"
                   placeholder="z. B. Deutschland">
        </div>
        <div class="mb-3">
            <label class="form-label">
                Jahr
            </label>
            <input type="number"
                   name="year"
                   class="form-control"
                   placeholder="2024">
        </div>
        <div class="mb-3">
            <label class="form-label">
                CO₂-Ausstoß
            </label>
            <input type="number"
                   name="co2"
                   step="0.1"
                   class="form-control"
                   placeholder="500.5">
        </div>
        <button type="submit"
                class="btn btn-success">
            Daten speichern
        </button>
    </form>
    </div>
    </div>
<div th:if="${country}"
     class="card mt-5 p-4 border-success">
    <h4>
        Gespeicherte Eingaben
    </h4>
    <p>
        <strong>Land:</strong>
        <span th:text="${country}"></span>
    </p>
    <p>
        <strong>Jahr:</strong>
        <span th:text="${year}"></span>
    </p>
    <p>
        <strong>CO₂-Ausstoß:</strong>
        <span th:text="${co2}"></span>
    </p>

</div>
<div class="card shadow mt-5 p-4">
    <h3 class="mb-4">
        Gespeicherte CO₂-Daten
    </h3>
    <table class="table table-striped table-hover">
        <thead class="table-success">
        <tr>
            <th>Land</th>
            <th>Jahr</th>
            <th>CO₂-Ausstoß</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${emissions}">
            <td th:text="${entry.country}"></td>
            <td th:text="${entry.year}"></td>
            <td th:text="${entry.co2}"></td>
        </tr>
        </tbody>
    </table>
</div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
