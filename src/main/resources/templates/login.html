<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body style="background-color: #f4f7f6">
<div class="container mt-5">
    <div class="card shadow p-5 mx-auto"
         style="max-width: 500px">
        <h2 class="mb-4 text-center">
            Wissenschaftler-Login
        </h2>
        <div th:if="${errorMessage}"
             class="alert alert-danger">
            <span th:text="${errorMessage}"></span>
        </div>
        <form method="post"
              action="/login">
            <div class="mb-3">
                <label class="form-label">
                    Benutzername
                </label>
                <input type="text"
                       name="username"
                       class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Passwort
                </label>
                <input type="password"
                       name="password"
                       class="form-control">
            </div>
            <button type="submit"
                    class="btn btn-success w-100">
                Einloggen
            </button>
        </form>
    </div>
</div>
</body>
</html>
